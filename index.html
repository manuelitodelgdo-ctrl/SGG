<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGG - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

:root{
    --bg: linear-gradient(135deg,#c7d2fe,#dbeafe,#f0f9ff);
    --card: rgba(255,255,255,.85);
    --text:#1e293b;
    --input:#eef2ff;
    --button:#6366f1;
    --button-hover:#4f46e5;
    --success:#16a34a;
    --error:#dc2626;
}

.dark-mode{
    --bg: linear-gradient(135deg,#020617,#0f172a,#1e1b4b);
    --card: rgba(30,41,59,.92);
    --text:#f8fafc;
    --input:#334155;
    --button:#8b5cf6;
    --button-hover:#7c3aed;
}

body{
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    transition:.4s;
}

.login-container{

    width:380px;

    background:var(--card);

    backdrop-filter:blur(15px);

    padding:35px;

    border-radius:25px;

    box-shadow:0 20px 40px rgba(0,0,0,.15);

    position:relative;
}

h1{
    color:var(--text);
    text-align:center;
    margin-bottom:25px;
}

label{
    color:var(--text);
    font-weight:bold;
    display:block;
    margin-top:12px;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:var(--input);
    color:var(--text);
    outline:none;
}

.login-btn{

    width:100%;

    padding:13px;

    margin-top:20px;

    border:none;

    border-radius:12px;

    background:var(--button);

    color:white;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;
}

.login-btn:hover{
    background:var(--button-hover);
    transform:scale(1.03);
}

.theme-btn{

    position:absolute;

    top:15px;

    right:15px;

    width:50px;

    height:50px;

    border:none;

    border-radius:50%;

    font-size:22px;

    cursor:pointer;

    background:var(--button);

    color:white;

    transition:.3s;
}

.theme-btn:hover{
    background:var(--button-hover);
}

#mensaje{

    display:none;

    margin-top:20px;

    padding:15px;

    text-align:center;

    border-radius:15px;

    font-weight:bold;

    animation:aparecer .5s;
}

.success{
    background:rgba(22,163,74,.15);
    border:2px solid #16a34a;
    color:#16a34a;
}

.error{
    background:rgba(220,38,38,.15);
    border:2px solid #dc2626;
    color:#dc2626;
}

@keyframes aparecer{

    from{
        opacity:0;
        transform:translateY(-10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<main class="login-container">

    <button id="themeToggle" class="theme-btn">
        🌙
    </button>

    <h1>SGG Login</h1>

    <form id="loginForm">

        <label>Usuario</label>

        <input
            type="text"
            id="usuario"
            placeholder="Ingresa tu usuario"
            required
        >

        <label>Contraseña</label>

        <input
            type="password"
            id="password"
            placeholder="Ingresa tu contraseña"
            required
        >

        <button
            type="submit"
            class="login-btn"
        >
            Iniciar Sesión
        </button>

    </form>

    <div id="mensaje"></div>

</main>

<script>

const usuarios = [

    {
        usuario:"Manuel",
        password:"1234"
    },

    {
        usuario:"Luciana",
        password:"abcd"
    }

];

const form =
document.getElementById("loginForm");

const mensaje =
document.getElementById("mensaje");

const themeToggle =
document.getElementById("themeToggle");

form.addEventListener("submit", function(event){

    event.preventDefault();

    const usuario =
    document.getElementById("usuario").value;

    const password =
    document.getElementById("password").value;

    const usuarioValido =
    usuarios.find(user =>

        user.usuario === usuario &&
        user.password === password

    );

    mensaje.style.display = "block";

    if(usuarioValido){

        mensaje.className = "success";

        mensaje.innerHTML =
        "✨<br><br><h2>¡Bienvenido!</h2><br>" +
        usuario +
        "<br><br>💙 Acceso concedido";

        localStorage.setItem(
            "usuarioActivo",
            usuario
        );

    }else{

        mensaje.className = "error";

        mensaje.innerHTML =
        "❌ Usuario o contraseña incorrectos";
    }

});

themeToggle.addEventListener("click", () => {

    document.body.classList.toggle("dark-mode");

    const oscuro =
    document.body.classList.contains("dark-mode");

    themeToggle.textContent =
    oscuro ? "☀️" : "🌙";

    localStorage.setItem(
        "modoOscuro",
        oscuro
    );

});

window.addEventListener("load", () => {

    const modoGuardado =
    localStorage.getItem("modoOscuro");

    if(modoGuardado === "true"){

        document.body.classList.add("dark-mode");

        themeToggle.textContent = "☀️";
    }

});

</script>

</body>
</html>
